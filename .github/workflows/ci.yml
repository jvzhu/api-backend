name: CI

on:
  push:
    branches:
      - main
      - master
      - 'copilot/**'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3000
      MONGODB_URI: mongodb://127.0.0.1:27017/api-backend-ci
      JWT_ACCESS_SECRET: ci-access-secret-12345
      JWT_REFRESH_SECRET: ci-refresh-secret-12345
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
